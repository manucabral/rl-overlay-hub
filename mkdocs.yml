site_name: RL Overlay Hub - Creator Docs
site_description: Documentation for building custom overlays with RL Overlay Hub
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Introduction: index.md
  - Quick Start: quickstart.md
  - Manifest Reference: manifest.md
  - JavaScript API: api.md
  - State Reference: state.md
  - Testing and Preview: testing.md
  - Adding to OBS: obs.md
  - Examples:
      - Minimal Scoreboard: examples/scoreboard.md
      - Goal Banner: examples/goal-banner.md
